name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

# Push ravvicinati sulla stessa PR annullano la review precedente: evita run
# in race sul commento track_progress e quota sprecata (utile con synchronize).
concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Solo team interno E solo PR dallo STESSO repo: sui fork esterni il
    # workflow `pull_request` non riceve i secret e il GITHUB_TOKEN è
    # read-only, quindi il job fallirebbe. NB: non usiamo `head.repo.fork`
    # perché questo repo è esso stesso un fork (sarebbe sempre true); il
    # confronto sul full_name distingue le PR interne da quelle da fork.
    if: |
      (github.event.pull_request.author_association == 'OWNER' ||
       github.event.pull_request.author_association == 'MEMBER' ||
       github.event.pull_request.author_association == 'COLLABORATOR') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # serve per track_progress e commenti inline
      id-token: write
      actions: read          # per leggere i risultati CI sulla PR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false   # il job commenta soltanto, non fa push git

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Rende effettivo il permesso job-level `actions: read`: senza questo
          # input Claude non può leggere i risultati CI della PR.
          additional_permissions: |
            actions: read

          # Commento con checklist di avanzamento che si aggiorna durante la review
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Esegui una review di questa pull request, in italiano, con focus su:
            1. Qualità e leggibilità (best practice, gestione errori, edge case)
            2. Sicurezza (input non validati, secret esposti, permessi)
            3. Correttezza e performance
            4. Test (copertura adeguata, casi mancanti)
            5. Documentazione (README/skill coerenti con le modifiche)

            Usa commenti inline per problemi puntuali sulle righe.
            Usa un commento top-level per osservazioni generali o apprezzamenti.
            Sii conciso: segnala solo ciò che conta davvero, evita rumore.

          claude_args: |
            --model opus
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
